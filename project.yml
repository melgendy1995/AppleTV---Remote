name: AppleTVRemote
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.mahmoudelgendy
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_NAME: "Apple TV Remote"
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "3"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  AppleTVRemote-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Vendor
        type: folder
        optional: true
        buildPhase: resources
    info:
      path: Info-macOS.plist
      properties:
        CFBundleDisplayName: Apple TV Remote
        LSApplicationCategoryType: public.app-category.utilities
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: YES
          NSAllowsArbitraryLoads: YES
        NSLocalNetworkUsageDescription: "Used to talk to the Apple TV control backend on your LAN."
        NSBonjourServices:
          - "_http._tcp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mahmoudelgendy.AppleTVRemote
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Entitlements-macOS.plist
